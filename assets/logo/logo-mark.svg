<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Taller Mayor Consultoría — TM mark">
  <title>TM Mark — Taller Mayor Consultoría</title>
  <!-- Background -->
  <rect width="100" height="100" fill="#1A1F2E"/>

  <!-- T letterform: crossbar + chamfered stem -->
  <path d="M 4,18 L 42,18 L 42,26 L 27,26 L 27,68 L 23,72 L 21,72 L 17,68 L 17,26 L 4,26 Z" fill="#E8E6E1"/>

  <!-- M letterform: solid shape with V-notch + chamfered outer top corners -->
  <path d="M 54,76 L 54,22 L 58,18 L 63,18 L 75,44 L 87,18 L 92,18 L 96,22 L 96,76 Z" fill="#E8E6E1"/>

  <!-- Amber calibration datum at y=44 (exact V-notch depth) -->
  <line x1="4" y1="44" x2="96" y2="44" stroke="#C8922A" stroke-width="0.75"/>

  <!-- Measurement ticks along datum line -->
  <g stroke="#C8922A" stroke-width="0.5" opacity="0.45">
    <line x1="14" y1="41.5" x2="14" y2="46.5"/>
    <line x1="30" y1="41.5" x2="30" y2="46.5"/>
    <line x1="46" y1="41.5" x2="46" y2="46.5"/>
    <line x1="62" y1="41.5" x2="62" y2="46.5"/>
    <line x1="78" y1="41.5" x2="78" y2="46.5"/>
  </g>

  <!-- Registration crosses at corners -->
  <g stroke="#C8922A" stroke-width="0.6" opacity="0.4">
    <line x1="4" y1="6" x2="4" y2="13"/>  <line x1="0.5" y1="9.5" x2="7.5" y2="9.5"/>
    <line x1="96" y1="6" x2="96" y2="13"/> <line x1="92.5" y1="9.5" x2="99.5" y2="9.5"/>
    <line x1="4" y1="87" x2="4" y2="94"/>  <line x1="0.5" y1="90.5" x2="7.5" y2="90.5"/>
    <line x1="96" y1="87" x2="96" y2="94"/><line x1="92.5" y1="90.5" x2="99.5" y2="90.5"/>
  </g>

  <!-- Vertical separator line between T and M (alignment reference) -->
  <line x1="49" y1="18" x2="49" y2="76" stroke="#C8922A" stroke-width="0.35" stroke-dasharray="3 3" opacity="0.3"/>
</svg>
